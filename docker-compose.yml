version: "3.9"

services:
  app:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000 --noreload"
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      NTP_PORT: "8000"
    volumes:
      - .:/app

  worker:
    build: .
    command: sh -c "python manage.py migrate && python manage.py process_jobs --poll-interval 2 --worker-name demo-worker"
    environment:
      DJANGO_DEBUG: "1"
    volumes:
      - .:/app

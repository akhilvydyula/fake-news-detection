# CI: tests + fast security gates (dependency audit + Bandit).
# Compare with GitLab: .gitlab-ci.yml stages often split test / sast / dependency_scanning.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (editable) + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke import (API)
        run: python -c "from src.api.main import app; print(app.title)"

      - name: Pytest
        run: pytest -q

  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev]"

      # Large ML stacks (e.g. TensorFlow) often surface many transitive advisories.
      # Default: non-blocking + JSON artifact for review. To block merges on findings,
      # remove `continue-on-error: true` below (GitLab equivalent: allow_failure: false).
      - name: Audit installed environment (JSON + table)
        id: pip_audit
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pip-audit --desc off -f json -o pip-audit-results.json
          ec=$?
          pip-audit --desc off
          exit $ec

      - name: Upload pip-audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          if-no-files-found: ignore

      - name: pip-audit policy reminder
        if: steps.pip_audit.outcome == 'failure'
        run: |
          echo "::warning::pip-audit reported known vulnerabilities in the resolved environment."
          echo "Download the pip-audit-results artifact from this job for details."
          echo "Remediation: upgrade pins, trim dependencies, or (carefully) use pip-audit --ignore-vuln ID."

  sast-bandit:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit + project (import graph)
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]>=1.7.9"
          pip install -e ".[dev]"

      - name: Bandit (SARIF + console)
        id: bandit
        run: |
          bandit -r src -c bandit.yaml -f sarif -o bandit-results.sarif \
            --severity-level medium --confidence-level medium
        continue-on-error: true

      - name: Upload Bandit SARIF
        if: always() && hashFiles('bandit-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Fail if Bandit found issues
        if: steps.bandit.outcome == 'failure'
        run: |
          echo "::error::Bandit reported medium+ issues. See job log; SARIF may appear under Security -> Code scanning."
          exit 1
